<!DOCTYPE html>

        .main-content { flex: 1; padding: 40px; background: #eef2f6; }
        .header { margin-bottom: 30px; }
        .header h1 { margin: 0 0 10px; font-size: 2rem; }
        .placeholder-box { background: #fff; border: 1px solid #d2d8e2; border-radius: 16px; padding: 40px; box-shadow: 0 8px 24px rgba(15,23,42,0.08); max-width: 860px; }
        .placeholder-box h2 { margin-top: 0; color: #1f2937; }
        .placeholder-box p { margin: 16px 0 0; color: #4b5563; line-height: 1.75; }

</head>

    <aside class="sidebar">

            <a href="/" class="nav-item"><i class="fas fa-home"></i> Inicio</a>
